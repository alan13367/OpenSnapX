name: OpenSnapX
options:
  bundleIdPrefix: io.github.alan13367
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CLANG_ENABLE_MODULES: YES
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: targeted
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
targets:
  OpenSnapX:
    type: application
    platform: macOS
    sources:
      - path: OpenSnapX
        excludes:
          - Resources/Info.plist
          - Resources/OpenSnapX.entitlements
    resources:
      - path: OpenSnapX/Resources/Assets.xcassets
    info:
      path: OpenSnapX/Resources/Info.plist
      properties:
        CFBundleDevelopmentRegion: "$(DEVELOPMENT_LANGUAGE)"
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: "$(PRODUCT_NAME)"
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        LSUIElement: true
        NSHighResolutionCapable: true
        NSScreenCaptureUsageDescription: OpenSnapX needs Screen Recording access to capture screenshots you request. Captures stay on this Mac.
        NSHumanReadableCopyright: Copyright © 2026 OpenSnapX contributors. GPL-3.0.
        NSPrincipalClass: NSApplication
    entitlements:
      path: OpenSnapX/Resources/OpenSnapX.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.alan13367.OpenSnapX
        PRODUCT_NAME: OpenSnapX
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  OpenSnapXTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: OpenSnapXTests
    dependencies:
      - target: OpenSnapX
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.alan13367.OpenSnapXTests
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
schemes:
  OpenSnapX:
    build:
      targets:
        OpenSnapX: all
        OpenSnapXTests: [test]
    test:
      targets:
        - OpenSnapXTests
      gatherCoverageData: true
